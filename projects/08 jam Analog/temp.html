<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jam Analog Sederhana</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #2c3e50;
      font-family: Arial, sans-serif;
    }

    .clock {
      width: 300px;
      height: 300px;
      border: 6px solid #ecf0f1;
      border-radius: 50%;
      position: relative;
      background: #fff;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 10px;
    }

    .hour-hand {
      width: 8px;
      height: 70px;
      background: #2c3e50;
      transform: translateX(-50%);
    }

    .minute-hand {
      width: 6px;
      height: 100px;
      background: #34495e;
      transform: translateX(-50%);
    }

    .second-hand {
      width: 2px;
      height: 120px;
      background: #e74c3c;
      transform: translateX(-50%);
    }

    .center-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      background: #e74c3c;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="clock">
    <div class="hand hour-hand" id="hour-hand"></div>
    <div class="hand minute-hand" id="minute-hand"></div>
    <div class="hand second-hand" id="second-hand"></div>
    <div class="center-dot"></div>
  </div>

  <script>
    function setTime() {
      const now = new Date();
      const seconds = now.getSeconds();
      const minutes = now.getMinutes();
      const hours = now.getHours();

      // Hitung rotasi dalam derajat
      const secondDeg = (seconds / 60) * 360;
      const minuteDeg = ((minutes + seconds / 60) / 60) * 360;
      const hourDeg = ((hours % 12 + minutes / 60) / 12) * 360;

      // Terapkan rotasi ke masing-masing jarum
      document.getElementById('second-hand').style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
      document.getElementById('minute-hand').style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
      document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
    }

    // Jalankan pertama kali agar langsung tampil
    setTime();

    // Perbarui setiap detik
    setInterval(setTime, 1000);
  </script>

</body>
</html>
